name: Bug report
description: Report a problem in aurview
title: "bug: "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - aur rpc
        - package sources
        - ranking
        - search
        - tui
        - keyboard input
        - mouse input
        - clipboard
        - history
        - config
        - themes
        - docs
        - ci
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Something isn't working
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
      placeholder: Describe the expected result.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
      placeholder: Describe the observed result.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste any error messages, stack traces, or screenshots.
      render: shell

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Share relevant environment details.
      placeholder: |
        OS:
        Terminal:
        aurview version / commit:
        Go version:
        Config:

  - type: checkboxes
    id: readonly
    attributes:
      label: Read-only safety
      description: Confirm this report does not request package installation or execution behavior.
      options:
        - label: This issue is about search, inspection, display, history, metadata, config or clipboard behavior only.
          required: true
