name: Feature suggestion
description: Suggest a feature or improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project should be improved?
      options:
        - aur rpc
        - package sources
        - ranking
        - search
        - tui
        - keyboard input
        - mouse input
        - clipboard
        - history
        - config
        - themes
        - docs
        - ci
        - other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What issue or limitation does this improve?
      placeholder: Explain why this change is useful.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What should be implemented or changed?
      placeholder: Describe the feature or improvement.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Did you consider other approaches?
      placeholder: Optional.

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What needs to be true for this issue to be done?
      placeholder: |
        - [ ] ...
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Optional implementation details, references, or edge cases.
      placeholder: Add any extra context here.

  - type: checkboxes
    id: readonly
    attributes:
      label: Read-only safety
      description: aurview must remain a metadata-only package discovery tool.
      options:
        - label: This proposal does not add install, download, clone, build, update or remove behavior.
          required: true
